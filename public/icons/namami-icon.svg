<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="NAMAMI logo">
  <defs>
    <linearGradient id="tileGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CF8FF"/>
      <stop offset="100%" stop-color="#35E8F5"/>
    </linearGradient>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1D24"/>
      <stop offset="100%" stop-color="#050A0D"/>
    </linearGradient>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#35E8F5" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#35E8F5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bgGlow)"/>

  <g transform="translate(76,76)">
    <g fill="#10313B" stroke="#1D4E5D" stroke-opacity="0.45" stroke-width="2">
